# =============================================
# Warehouse Management System - Configuration
# =============================================

server:
  port: ${PORT:8080}

spring:
  application:
    name: warehouse-management-system

  # ---- PostgreSQL DataSource ----
  datasource:
    url: ${DB_URL:jdbc:postgresql://dpg-d7oduh7lk1mc73f25vig-a.oregon-postgres.render.com:5432/cloud_zxuz?sslmode=require}
    username: ${DB_USERNAME:cloud_zxuz_user}
    password: ${DB_PASSWORD:GmNsVxNwJHm89UEnW5XripKWSxv8b32Y}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

# ---- JWT Configuration ----
app:
  jwt:
    secret: ${JWT_SECRET:warehouse-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiration-ms: 86400000   # 24 hours

# ---- Swagger / OpenAPI ----
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ---- Logging ----
logging:
  level:
    root: INFO
    com.warehouse: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
